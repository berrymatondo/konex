  <path d="M625,670 L30,670 L30,302 L63,302" stroke="#f97316" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#ah-o)"/>
  <text x="32" y="490" fill="#f97316" font-size="9">Agent: Modifier</text>
  <text x="32" y="503" fill="#f97316" font-size="9">&amp; re-soumettre</text>

  <!-- accepted → in_transit -->
  <path d="M785,575 L900,575" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#ah-b)"/>
  <text x="843" y="566" text-anchor="middle" fill="#3b82f6" font-size="10">Expédier</text>

  <!-- in_transit → delivered -->
  <path d="M1060,575 L1140,575" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#ah)"/>
  <text x="1100" y="566" text-anchor="middle" fill="#64748b" font-size="10">Réception coffre</text>

  <!-- delivered → pending_settlement -->
  <path d="M1220,597 L1220,668" stroke="#d97706" stroke-width="2" fill="none" marker-end="url(#ah)"/>
