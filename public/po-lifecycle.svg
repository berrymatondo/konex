  <text x="267" y="424" text-anchor="middle" fill="#ef4444" font-size="10">Rejeter</text>

  <!-- sent_to_cp → accepted -->
  <path d="M241,590 C460,590 460,575 625,575" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#ah-o)"/>
  <text x="430" y="563" text-anchor="middle" fill="#f97316" font-size="10">Accepter</text>

  <!-- sent_to_cp → negotiating -->
  <path d="M241,595 C430,595 430,670 625,670" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#ah-o)"/>
  <text x="430" y="648" text-anchor="middle" fill="#f97316" font-size="10">Négocier</text>

  <!-- sent_to_cp → declined -->
