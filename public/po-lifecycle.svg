  <text x="390" y="353" text-anchor="middle" fill="#64748b" font-size="9">Optionnel · Système</text>
  <text x="390" y="367" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">Attente Finance</text>
