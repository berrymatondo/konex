  <line x1="840" y1="64" x2="880" y2="64" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="888" y="69" fill="#94a3b8" font-size="12">État optionnel</text>

  <!-- ===== PHASE BANDS ===== -->
  <rect x="28" y="85" width="230" height="74" rx="6" fill="#1e3a5f" fill-opacity="0.15" stroke="#1e3a5f" stroke-width="1"/>
  <text x="143" y="100" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="bold">PHASE 1 · CRÉATION</text>

  <rect x="28" y="232" width="230" height="246" rx="6" fill="#1e3a5f" fill-opacity="0.12" stroke="#1e3a5f" stroke-width="1"/>
  <text x="143" y="248" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="bold">PHASE 2 · APPROBATION INTERNE</text>

  <rect x="28" y="554" width="230" height="76" rx="6" fill="#1e3a5f" fill-opacity="0.12" stroke="#1e3a5f" stroke-width="1"/>
  <text x="143" y="570" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="bold">PHASE 3 · TRANSMISSION</text>

  <rect x="590" y="532" width="230" height="250" rx="6" fill="#431407" fill-opacity="0.18" stroke="#7c2d12" stroke-width="1"/>
  <text x="705" y="548" text-anchor="middle" fill="#f97316" font-size="10" font-weight="bold">PHASE 4 · RÉPONSE CONTREPARTIE</text>

