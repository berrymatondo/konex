  <text x="390" y="887" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Annulé</text>
  <text x="390" y="899" text-anchor="middle" fill="#f87171" font-size="9" font-style="italic">cancelled</text>

  <!-- ===== ARROWS ===== -->

  <!-- draft → submitted -->
  <path d="M143,144 L143,280" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#ah-b)"/>
