  <!-- submitted → cancelled (dashed) -->
  <path d="M223,320 C290,320 290,880 310,880" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#ah-r)"/>

  <!-- sent_to_cp → cancelled (dashed) -->
  <path d="M143,612 C143,880 310,880 310,880" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#ah-r)"/>

  <!-- Cancelled note -->
  <text x="205" y="810" fill="#ef4444" font-size="9">Agent: Annuler</text>
  <text x="205" y="823" fill="#ef4444" font-size="9">(draft, submitted,</text>
  <text x="205" y="836" fill="#ef4444" font-size="9">sent_to_cp...)</text>

</svg>
