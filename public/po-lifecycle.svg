<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" width="1600" height="980" font-family="Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#94a3b8"/></marker>
    <marker id="ah-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#60a5fa"/></marker>
    <marker id="ah-o" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#fb923c"/></marker>
    <marker id="ah-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f87171"/></marker>
    <marker id="ah-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4ade80"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="980" fill="#0f172a"/>

  <!-- Title -->
  <text x="800" y="40" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="bold">Cycle de vie — Bons de Commande</text>

  <!-- Legend -->
  <rect x="80" y="58" width="13" height="13" rx="2" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="69" fill="#94a3b8" font-size="12">Agent BCC</text>
  <rect x="210" y="58" width="13" height="13" rx="2" fill="#431407" stroke="#f97316" stroke-width="1.5"/>
  <text x="230" y="69" fill="#94a3b8" font-size="12">Contrepartie</text>
  <rect x="360" y="58" width="13" height="13" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="380" y="69" fill="#94a3b8" font-size="12">Système</text>
  <rect x="470" y="58" width="13" height="13" rx="2" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="490" y="69" fill="#94a3b8" font-size="12">Erreur / Annulé</text>
  <rect x="640" y="58" width="13" height="13" rx="2" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
