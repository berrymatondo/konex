  <text x="1220" y="697" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Attente Règlement</text>
  <text x="1220" y="709" text-anchor="middle" fill="#fcd34d" font-size="9" font-style="italic">pending_settlement</text>

